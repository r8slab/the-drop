name: Generate The Drop

on:
  schedule:
    # 7:00 AM ET Mon/Wed/Fri (12:00 UTC during EST, 11:00 UTC during EDT)
    # Using 12:00 UTC for EST
    - cron: '0 12 * * 1,3,5'
  workflow_dispatch:  # Allow manual triggers

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Decrypt token files
        env:
          TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}
        run: |
          openssl enc -aes-256-cbc -d -salt -pbkdf2 -in token-source.json.enc -out token-source.json -pass env:TOKEN_ENCRYPTION_KEY
          openssl enc -aes-256-cbc -d -salt -pbkdf2 -in token-sender.json.enc -out token-sender.json -pass env:TOKEN_ENCRYPTION_KEY

      - name: Set up credentials
        env:
          GMAIL_CREDENTIALS_SOURCE: ${{ secrets.GMAIL_CREDENTIALS_SOURCE }}
          GMAIL_CREDENTIALS_SENDER: ${{ secrets.GMAIL_CREDENTIALS_SENDER }}
        run: |
          echo "$GMAIL_CREDENTIALS_SOURCE" > credentials-source.json
          echo "$GMAIL_CREDENTIALS_SENDER" > credentials-sender.json

      - name: Run The Drop generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SEND_TO: ${{ secrets.SEND_TO }}
          CLAUDE_MODEL: claude-sonnet-4-20250514
        run: python the_drop.py

      - name: Persist refreshed tokens
        if: success()
        env:
          TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}
        run: |
          openssl enc -aes-256-cbc -salt -pbkdf2 -in token-source.json -out token-source.json.enc.new -pass env:TOKEN_ENCRYPTION_KEY
          openssl enc -aes-256-cbc -salt -pbkdf2 -in token-sender.json -out token-sender.json.enc.new -pass env:TOKEN_ENCRYPTION_KEY
          mv token-source.json.enc.new token-source.json.enc
          mv token-sender.json.enc.new token-sender.json.enc
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add token-source.json.enc token-sender.json.enc
          if ! git diff --cached --quiet; then
            git commit -m "chore: persist refreshed OAuth tokens"
            git push
          fi

      - name: Clean up credentials
        if: always()
        run: |
          rm -f token-source.json token-sender.json credentials-source.json credentials-sender.json
